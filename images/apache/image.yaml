name: apache
version: "2.4"
profile: runtime

base:
  distribution: debian
  suite: bookworm
  architectures:
    - amd64
    - arm64
  mirror: http://deb.debian.org/debian
  securityMirror: http://security.debian.org/debian-security
  variant: minbase

packages:
  install:
    - ca-certificates
    - apache2
  remove:
    - apt

user:
  name: apache
  uid: 10001
  gid: 0
  home: /var/www/html
  shell: /usr/sbin/nologin

paths:
  - path: /run/apache
    owner: 10001:0
    mode: "0770"
  - path: /var/log/apache2
    owner: 10001:0
    mode: "0770"
  - path: /var/cache/apache2
    owner: 10001:0
    mode: "0770"
  - path: /etc/apache
    owner: root:0
    mode: "0750"

files:
  - source: apache.conf
    destination: /etc/apache/apache.conf
    owner: root:0
    mode: "0640"

entrypoint:
  - /usr/sbin/apache2

cmd:
  - -DFOREGROUND
  - -f
  - /etc/apache/apache.conf

ports:
  - 8080

hardening:
  removeApt: true
  removeDpkg: false
  cleanAptCache: true
  cleanDocs: true
  cleanManPages: true
  cleanLogs: true
  cleanTmp: true
  runAsNonRoot: true
  openshiftCompatible: true

oci:
  registry: ghcr.io
  namespace: ""
  image: apache
  tag: "2.4-bookworm"
