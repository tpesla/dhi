name: Build PostgreSQL image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/postgresql-image.yml
      - images/postgresql/**
  pull_request:
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/postgresql-image.yml
      - images/postgresql/**
  workflow_dispatch:
    inputs:
      push:
        description: Push to the configured registry after build, smoke test, SBOM, and scan.
        required: false
        default: false
        type: boolean

concurrency:
  group: postgresql-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgresql:
    strategy:
      fail-fast: false
      matrix:
        target:
          - debian_arch: amd64
            platform: linux/amd64
          - debian_arch: arm64
            platform: linux/arm64
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-build-debian-image.yml
    with:
      image_name: postgresql
      image_version: "15"
      debian_suite: bookworm
      debian_arch: ${{ matrix.target.debian_arch }}
      platform: ${{ matrix.target.platform }}
      packages: ca-certificates,postgresql-15
      cmd: '["/usr/lib/postgresql/15/bin/postgres","--version"]'
      workdir: /var/lib/postgresql
      exposed_ports: "5432"
      runtime_user_name: postgres
      runtime_home: /var/lib/postgresql
      writable_paths: /var/lib/postgresql /run/postgresql /var/log/postgresql
      smoke_mode: oneshot
      smoke_command: /usr/lib/postgresql/15/bin/postgres --version
      smoke_expected_output: PostgreSQL
      push_primary_tag: false
      push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      generate_sbom: true
      scan: true
      fail_on_vulnerabilities: true
      sign: true
    secrets: inherit

  postgresql-manifest:
    needs: postgresql
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-publish-image-manifest.yml
    with:
      image_name: postgresql
      image_version: "15"
      debian_suite: bookworm
      sign: true
    secrets: inherit
