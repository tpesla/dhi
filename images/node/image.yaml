name: node
version: "18"
profile: runtime

base:
  distribution: debian
  suite: bookworm
  architectures:
    - amd64
    - arm64
  mirror: http://deb.debian.org/debian
  securityMirror: http://security.debian.org/debian-security
  variant: minbase

packages:
  install:
    - ca-certificates
    - nodejs
  remove:
    - apt

user:
  name: node
  uid: 10001
  gid: 0
  home: /home/node
  shell: /usr/sbin/nologin

paths:
  - path: /app
    owner: 10001:0
    mode: "0770"
  - path: /home/node
    owner: 10001:0
    mode: "0770"

cmd:
  - /usr/bin/node
  - --version

hardening:
  removeApt: true
  removeDpkg: false
  cleanAptCache: true
  cleanDocs: true
  cleanManPages: true
  cleanLogs: true
  cleanTmp: true
  runAsNonRoot: true
  openshiftCompatible: true

oci:
  registry: ghcr.io
  namespace: ""
  image: node
  tag: "18-bookworm"
