global
    log stdout format raw local0
    maxconn 256
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log global
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http
    bind :8080
    http-request return status 200 content-type text/plain string "OK\n" if { path /healthz }
    default_backend empty

backend empty
    http-request return status 404 content-type text/plain string "Not found\n"
