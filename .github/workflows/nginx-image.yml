name: Build Nginx image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/nginx-image.yml
      - images/nginx/**
  pull_request:
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/nginx-image.yml
      - images/nginx/**
  workflow_dispatch:
    inputs:
      push:
        description: Push to the configured registry after build, smoke test, SBOM, and scan.
        required: false
        default: false
        type: boolean

concurrency:
  group: nginx-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nginx:
    strategy:
      fail-fast: false
      matrix:
        target:
          - debian_arch: amd64
            platform: linux/amd64
          - debian_arch: arm64
            platform: linux/arm64
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-build-debian-image.yml
    with:
      image_name: nginx
      image_version: "1.22"
      debian_suite: bookworm
      debian_arch: ${{ matrix.target.debian_arch }}
      platform: ${{ matrix.target.platform }}
      packages: ca-certificates,nginx
      runtime_closure: true
      runtime_closure_binaries: /usr/sbin/nginx
      runtime_closure_paths: |
        /etc/nginx
        /etc/ssl/certs
        /usr/lib/*/ossl-modules
        /var/www/html
      forbidden_packages: apt,libapt-pkg6.0,debian-archive-keyring,gpgv,iproute2,libbpf1,libelf1,libmnl0,libxtables12,libcap2-bin,usrmerge,perl,perl-modules-5.36,libperl5.36,libfile-find-rule-perl,libnumber-compare-perl,libtext-glob-perl,libgdbm6,libgdbm-compat4,bash,dash,dpkg
      allowed_packages: ${{ matrix.target.debian_arch == 'amd64' && 'ca-certificates,libc6,libcrypt1,libssl3,nginx,nginx-common,zlib1g' || 'ca-certificates,libc6,libcrypt1,nginx,nginx-common,zlib1g' }}
      config_path: images/nginx/nginx.conf
      entrypoint: '["/usr/sbin/nginx"]'
      cmd: '["-g","daemon off;","-c","/etc/nginx/nginx.conf"]'
      workdir: /var/www/html
      exposed_ports: "8080"
      writable_paths: /run/nginx /var/cache/nginx /var/log/nginx /var/lib/nginx
      smoke_mode: running
      smoke_http_port: "8080"
      smoke_http_path: /healthz
      smoke_http_expected_body: OK
      smoke_command: /usr/sbin/nginx -t -c /etc/nginx/nginx.conf
      smoke_expected_output: "syntax is ok"
      remove_shell: true
      push_primary_tag: false
      push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      generate_sbom: true
      scan: true
      fail_on_vulnerabilities: true
      sign: true
    secrets: inherit

  nginx-manifest:
    needs: nginx
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-publish-image-manifest.yml
    with:
      image_name: nginx
      image_version: "1.22"
      debian_suite: bookworm
      sign: true
    secrets: inherit
