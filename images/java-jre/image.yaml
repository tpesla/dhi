name: java-jre
version: "17"
profile: runtime

base:
  distribution: debian
  suite: bookworm
  architectures:
    - amd64
    - arm64
  mirror: http://deb.debian.org/debian
  securityMirror: http://security.debian.org/debian-security
  variant: minbase

packages:
  install:
    - ca-certificates
    - openjdk-17-jre-headless
  remove:
    - apt

user:
  name: java
  uid: 10001
  gid: 0
  home: /home/java
  shell: /usr/sbin/nologin

paths:
  - path: /app
    owner: 10001:0
    mode: "0770"
  - path: /home/java
    owner: 10001:0
    mode: "0770"

environment: {}

cmd:
  - /usr/bin/java
  - -version

hardening:
  removeApt: true
  removeDpkg: false
  cleanAptCache: true
  cleanDocs: true
  cleanManPages: true
  cleanLogs: true
  cleanTmp: true
  runAsNonRoot: true
  openshiftCompatible: true

oci:
  registry: ghcr.io
  namespace: ""
  image: java-jre
  tag: "17-bookworm"
