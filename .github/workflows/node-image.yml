name: Build Node.js image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/node-image.yml
      - images/node/**
  pull_request:
    paths:
      - .github/workflows/reusable-build-debian-image.yml
      - .github/workflows/reusable-publish-image-manifest.yml
      - .github/workflows/node-image.yml
      - images/node/**
  workflow_dispatch:
    inputs:
      push:
        description: Push to the configured registry after build, smoke test, SBOM, and scan.
        required: false
        default: false
        type: boolean

concurrency:
  group: node-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    strategy:
      fail-fast: false
      matrix:
        target:
          - debian_arch: amd64
            platform: linux/amd64
          - debian_arch: arm64
            platform: linux/arm64
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-build-debian-image.yml
    with:
      image_name: node
      image_version: "18"
      debian_suite: bookworm
      debian_arch: ${{ matrix.target.debian_arch }}
      platform: ${{ matrix.target.platform }}
      packages: ca-certificates,nodejs
      cmd: '["/usr/bin/node","--version"]'
      workdir: /app
      runtime_user_name: node
      runtime_home: /home/node
      writable_paths: /app /home/node
      smoke_mode: oneshot
      smoke_command: /usr/bin/node --version
      smoke_expected_output: "v18"
      push_primary_tag: false
      push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      generate_sbom: true
      scan: true
      fail_on_vulnerabilities: true
      sign: true
    secrets: inherit

  node-manifest:
    needs: node
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/reusable-publish-image-manifest.yml
    with:
      image_name: node
      image_version: "18"
      debian_suite: bookworm
      sign: true
    secrets: inherit
