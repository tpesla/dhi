nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

replicaCount: 3
workload:
  type: statefulset
updateStrategy:
  type: RollingUpdate

image:
  registry: ghcr.io
  repository: tpesla/mongodb
  tag: 8.0-bookworm
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podLabels: {}
podAnnotations: {}
podSecurityContext:
  enabled: true
  fsGroup: 0
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  enabled: true
  runAsUser: 10001
  runAsGroup: 0
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

command:
  - /bin/sh
  - -ec
args:
  - |
    set -eu
    mkdir -p /data/db /run/mongodb /var/log/mongodb

    set -- /usr/bin/mongod --config /etc/mongodb/mongodb.conf
    if [ "${MONGODB_REPLICA_SET_ENABLED}" = "true" ]; then
      set -- "$@" --replSet "$MONGODB_REPLICA_SET_NAME"
    fi

    "$@" &
    mongod_pid="$!"

    stop_mongod() {
      kill -TERM "$mongod_pid" >/dev/null 2>&1 || true
      wait "$mongod_pid" || true
    }
    trap stop_mongod TERM INT

    if [ "${MONGODB_REPLICA_SET_ENABLED}" = "true" ] && [ "${HOSTNAME##*-}" = "0" ]; then
      until /usr/bin/mongosh --quiet --host 127.0.0.1 --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; do
        sleep 2
      done

      members=""
      i=0
      while [ "$i" -lt "$MONGODB_REPLICA_SET_REPLICAS" ]; do
        host="${MONGODB_STATEFULSET_NAME}-${i}.${MONGODB_SERVICE_NAME}.${POD_NAMESPACE}.svc.cluster.local:27017"
        if [ -n "$members" ]; then
          members="${members},"
        fi
        members="${members}{ _id: ${i}, host: \"${host}\" }"
        i=$((i + 1))
      done

      cat > /tmp/rs-init.js <<EOF
    try {
      const status = rs.status();
      if (status.ok === 1) {
        quit(0);
      }
    } catch (e) {
      rs.initiate({
        _id: "${MONGODB_REPLICA_SET_NAME}",
        members: [${members}]
      });
    }
    EOF

      attempt=0
      until /usr/bin/mongosh --quiet --host 127.0.0.1 /tmp/rs-init.js; do
        attempt=$((attempt + 1))
        if [ "$attempt" -ge 30 ]; then
          echo "Replica set initialization did not complete after ${attempt} attempts" >&2
          break
        fi
        sleep 5
      done
    fi

    wait "$mongod_pid"
env:
  MONGODB_REPLICA_SET_ENABLED: "true"
  MONGODB_REPLICA_SET_NAME: rs0
  MONGODB_REPLICA_SET_REPLICAS: "{{ .Values.replicaCount }}"
  MONGODB_SERVICE_NAME: '{{ include "dhi.common.fullname" . }}'
  MONGODB_STATEFULSET_NAME: '{{ include "dhi.common.fullname" . }}'
  POD_NAMESPACE: "{{ .Release.Namespace }}"
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
extraEnvFrom: []

containerPorts:
  - name: mongodb
    containerPort: 27017
    protocol: TCP
service:
  enabled: true
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
  annotations: {}

config:
  enabled: true
  filename: mongodb.conf
  mountPath: /etc/mongodb/mongodb.conf
  data:
    mongodb.conf: |
      net:
        port: 27017
        bindIpAll: true

      storage:
        dbPath: /data/db

      processManagement:
        fork: false

persistence:
  enabled: true
  volumeClaimTemplate: true
  existingClaim: ""
  storageClass: ""
  annotations: {}
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /data/db

emptyDirs:
  - name: run
    mountPath: /run/mongodb
  - name: logs
    mountPath: /var/log/mongodb
extraVolumes: []
extraVolumeMounts: []
initContainers: []
sidecars: []
resources: {}
lifecycle: {}

livenessProbe:
  enabled: true
  tcpSocket:
    port: mongodb
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  enabled: true
  tcpSocket:
    port: mongodb
  initialDelaySeconds: 10
  periodSeconds: 10
startupProbe:
  enabled: true
  tcpSocket:
    port: mongodb
  failureThreshold: 60
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

pdb:
  create: true
  minAvailable: ""
  maxUnavailable: 1

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

openshift:
  enabled: false

metrics:
  enabled: false

networkPolicy:
  enabled: false
  allowExternal: true
  ingress: []
  egress: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
