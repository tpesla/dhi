name: php-fpm
version: "8.2"
profile: runtime

base:
  distribution: debian
  suite: bookworm
  architectures:
    - amd64
    - arm64
  mirror: http://deb.debian.org/debian
  securityMirror: http://security.debian.org/debian-security
  variant: minbase

packages:
  install:
    - ca-certificates
    - php8.2-fpm
  remove:
    - apt

user:
  name: php
  uid: 10001
  gid: 0
  home: /var/www/html
  shell: /usr/sbin/nologin

paths:
  - path: /run/php-fpm
    owner: 10001:0
    mode: "0770"
  - path: /var/log/php8.2-fpm
    owner: 10001:0
    mode: "0770"
  - path: /var/www/html
    owner: 10001:0
    mode: "0770"
  - path: /etc/php-fpm
    owner: root:0
    mode: "0750"

files:
  - source: php-fpm.conf
    destination: /etc/php-fpm/php-fpm.conf
    owner: root:0
    mode: "0640"

entrypoint:
  - /usr/sbin/php-fpm8.2

cmd:
  - -F
  - -O
  - -y
  - /etc/php-fpm/php-fpm.conf

ports:
  - 9000

hardening:
  removeApt: true
  removeDpkg: false
  cleanAptCache: true
  cleanDocs: true
  cleanManPages: true
  cleanLogs: true
  cleanTmp: true
  runAsNonRoot: true
  openshiftCompatible: true

oci:
  registry: ghcr.io
  namespace: ""
  image: php-fpm
  tag: "8.2-bookworm"
