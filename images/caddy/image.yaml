name: caddy
version: "2"
profile: runtime

base:
  distribution: debian
  suite: bookworm
  architectures:
    - amd64
    - arm64
  mirror: http://deb.debian.org/debian
  securityMirror: http://security.debian.org/debian-security
  variant: minbase

packages:
  install:
    - ca-certificates
    - caddy
  remove:
    - apt

user:
  name: caddy
  uid: 10001
  gid: 0
  home: /srv
  shell: /usr/sbin/nologin

paths:
  - path: /config
    owner: 10001:0
    mode: "0770"
  - path: /data
    owner: 10001:0
    mode: "0770"
  - path: /srv
    owner: 10001:0
    mode: "0770"
  - path: /etc/caddy
    owner: root:0
    mode: "0750"

files:
  - source: Caddyfile
    destination: /etc/caddy/caddy.conf
    owner: root:0
    mode: "0640"

environment:
  XDG_CONFIG_HOME: /config
  XDG_DATA_HOME: /data

entrypoint:
  - /usr/bin/caddy

cmd:
  - run
  - --config
  - /etc/caddy/caddy.conf
  - --adapter
  - caddyfile

ports:
  - 8080

hardening:
  removeApt: true
  removeDpkg: false
  cleanAptCache: true
  cleanDocs: true
  cleanManPages: true
  cleanLogs: true
  cleanTmp: true
  runAsNonRoot: true
  openshiftCompatible: true

oci:
  registry: ghcr.io
  namespace: ""
  image: caddy
  tag: "2-bookworm"
